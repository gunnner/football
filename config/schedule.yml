sync_static_data:
  cron: '0 3 * * 1'
  class: SyncStaticDataWorker
  queue: low
  description: 'Sync countries and leagues weekly'

sync_weekly_fixtures:
  cron: '0 4 * * 1'
  class: SyncWeeklyFixturesWorker
  queue: low
  description: 'Import fixtures for the next 7 days every Monday at 4am (7 API calls)'

sync_h2h:
  cron: '0 5 * * 1'
  class: SyncH2hWorker
  queue: low
  description: 'Sync H2H match history for upcoming fixtures every Monday at 5am'

sync_matches:
  cron: '0 6 * * *'
  class: SyncMatchesWorker
  queue: default
  description: 'Refresh today match statuses at 6am'

sync_live_matches:
  cron: '* * * * *'
  class: SyncLiveMatchesWorker
  queue: critical
  description: 'Sync live matches every 5 minutes (only when matches are active)'

sync_match_details:
  cron: '0 * * * *'
  class: SyncMatchDetailsWorker
  queue: default
  description: 'Sync live match events, stats, lineups, box scores every hour'

sync_live_events:
  cron: '* * * * *'
  class: SyncLiveEventsWorker
  queue: default
  description: 'Sync live match events and statistics every 5 minutes, broadcast new events via ActionCable'

sync_highlights:
  cron: '0 23 * * *'
  class: SyncHighlightsWorker
  queue: low
  description: 'Sync match highlights every day at 23:00'

sync_all_standings:
  cron: '0 7 * * *'
  class: SyncAllStandingsWorker
  queue: low
  description: 'Sync standings for all active leagues at 7 am'

sync_team_statistics:
  cron: '0 8 * * 1'
  class: SyncTeamStatisticsWorker
  queue: low
  description: 'Sync team season statistics every Monday at 8am (20 API calls)'

sync_player_statistics:
  cron: '0 3 * * 2'
  class: SyncPlayerStatisticsWorker
  queue: low
  description: 'Sync player statistics in batches every Tuesday at 3am (50 API calls)'

sync_player_profiles:
  cron: '0 4 * * 3'
  class: SyncPlayerProfilesWorker
  queue: low
  description: 'Sync player profiles, transfers, injuries, rumours, market values every Wednesday at 4am'

sync_pre_match_lineups:
  cron: '*/15 * * * *'
  class: SyncPreMatchLineupsWorker
  queue: default
  description: 'Check Highlightly API for confirmed lineups every 15 min for matches starting within 90 min'

cache_warmup:
  cron: '*/5 * * * *'
  class: CacheWarmupWorker
  queue: low
  description: 'Warm up cache every 5 minutes'
