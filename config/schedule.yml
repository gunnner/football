sync_static_data:
  cron: '0 3 * * *'
  class: SyncStaticDataWorker
  queue: low
  description: 'Sync countries and leagues daily at 3am'

sync_matches:
  cron: '0 6 * * *'
  class: SyncMatchesWorker
  queue: default
  description: 'Sync todays matches at 6am'

sync_live_matches:
  cron: '* * * * *'
  class: SyncLiveMatchesWorker
  queue: critical
  description: 'Sync live matches every minute'

sync_highlights:
  cron: '0 */6 * * *'
  class: SyncHighlightsWorker
  queue: low
  description: 'Sync highlights every 6 hours'

cache_warmup:
  cron: '*/5 * * * *'
  class: CacheWarmupWorker
  queue: low
  description: 'Warm up cache every 5 minutes'
