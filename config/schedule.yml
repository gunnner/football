sync_static_data:
  cron: '0 3 * * 1'
  class: SyncStaticDataWorker
  queue: low
  description: 'Sync countries and leagues weekly'

sync_weekly_fixtures:
  cron: '0 4 * * 1'
  class: SyncWeeklyFixturesWorker
  queue: low
  description: 'Import fixtures for the next 7 days every Monday at 4am (7 API calls)'

sync_matches:
  cron: '0 6 * * *'
  class: SyncMatchesWorker
  queue: default
  description: 'Refresh today match statuses at 6am'

sync_live_matches:
  cron: '*/5 * * * *'
  class: SyncLiveMatchesWorker
  queue: critical
  description: 'Sync live matches every 5 minutes (only when matches are active)'

sync_match_details:
  cron: '0 * * * *'
  class: SyncMatchDetailsWorker
  queue: default
  description: 'Sync live match events, stats, lineups every hour'

sync_highlights:
  cron: '0 23 * * *'
  class: SyncHighlightsWorker
  queue: low
  description: 'Sync match highlights every day at 23:00'

sync_all_standings:
  cron: '0 7 * * *' 
  class: SyncAllStandingsWorker
  queue: low
  description: 'Sync standings for all active leagues at 7 am'

cache_warmup:
  cron: '*/5 * * * *'
  class: CacheWarmupWorker
  queue: low
  description: 'Warm up cache every 5 minutes'
